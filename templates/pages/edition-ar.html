    <custom-style>
        <style include="pb-common-styles">
            body {
                --pb-view-height: calc(100vh - 192px);
                --pb-facsimile-height: calc(var(--pb-view-height) - 89px);
            }
            
            /* Prevent casual users from copying text */
            .content-body {
                -webkit-user-select: none; /* Safari */
                -moz-user-select: none;    /* Firefox */
                -ms-user-select: none;     /* IE10+/Edge */
                user-select: none;         /* Standard */
            }
            
            pb-facsimile {
                min-width: 480px;
                height: var(--pb-facsimile-height);
            }

            .facscaption {
                font-size: 75%;
                text-align: right;
            }

            .metadata {
                max-width: 20vw;
            }

            .content-body {
                position: relative;
                display: flex;
                justify-content: center;
                padding: 0 20px;
                margin-top: 20px;
            }

            .content-body pb-view {
                flex: 1 1;
            }

            .toc-toggle {
                display: none;
            }

            .breadcrumbs {
                display: flex;
                justify-content: space-between;
                align-self: center;
                background-color: #00883A;
                margin-top: -1px;
                color: #fff;
            }
/* Force toolbar to not create a restrictive stacking context */
app-toolbar.toolbar {
    z-index: auto !important;
    overflow: visible !important;
}

app-header {
    overflow: visible !important;
}

/* TOC Dropdown */
.toc-dropdown {
    position: relative;
    display: inline-block;
    z-index: 10001;
}

.toc-dropdown {
    padding: 10px 16px;
    font-size: 18px;
    border: none;
    cursor: pointer;
}

button {
  background-color: white;
  border: 2px solid #00883A;
  border-radius: 30px;
  color: black;
  padding: 12px 28px;
  text-align: center;
  text-decoration: none;
  display: inline-block;
  font-size: 16px;
  margin: 4px 2px;
  transition-duration: 0.4s;
  cursor: pointer;
}

button:hover {
  background-color: #00883A;
  color: white;
}

.toc-dropdown-content {
    display: none;
    position: absolute;
    top: calc(100% - 10px);
    left: 0;
    background-color: #f9f9f9;
    min-width: 200px;
    max-height: 50vh;
    overflow-y: auto;
    box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
    z-index: 10001;
    padding-top: 26px;
    padding-left: 16px;
    padding-right: 16px;
    padding-bottom: 16px;
    direction: ltr;
}

.toc-dropdown:hover .toc-dropdown-content {
    display: block;
}

/* Get rid of bulletpoints in TOC Dropdown */
.toc-dropdown-content ul {
    list-style: none !important;
    list-style-type: none !important;
    padding-left: 16px;
    margin: 0;
}

.toc-dropdown-content &gt; ul,
.toc-dropdown-content ul.edition-toc {
    padding-left: 0;
}

.toc-dropdown-content li {
    list-style: none !important;
    list-style-type: none !important;
}

pb-grid-action {
    padding-top: 15px;
}
           
        </style>
    </custom-style>

<script>
//
console.log('Script starting');

window.addEventListener('load', function() {
    console.log('Window loaded');
    
    var pageIds = [];
    var currentIndex = 0;
    var isLoading = false;
    var mainViewXpath = null;
    
    function getDocPath() {
        var pbDoc = document.getElementById('document1');
        if (pbDoc) {
            return pbDoc.getAttribute('path');
        }
        return null;
    }
    
    function findMainView() {
        var views = document.querySelectorAll('pb-view');
        for (var i = 0; i &lt; views.length; i++) {
            var view = views[i];
            var xpath = view.getAttribute('xpath') || '';
            // Look for xpath containing 'main-'
            if (xpath.indexOf('main-') !== -1) {
                mainViewXpath = xpath;
                return view;
            }
        }
        return null;
    }
    
    function loadPageIds(callback) {
        var docPath = getDocPath();
        if (!docPath) {
            console.log('Document path not found');
            return;
        }
        
        console.log('Loading page IDs for:', docPath);
        
        fetch('api/edition-sections?doc=' + encodeURIComponent(docPath))
            .then(function(response) {
                return response.json();
            })
            .then(function(data) {
                pageIds = data;
                console.log('Page IDs loaded:', pageIds.length);
                console.log('All pages:', pageIds);
                if (callback) callback();
            })
            .catch(function(error) {
                console.error('Error loading page IDs:', error);
            });
    }
    
    function detectCurrentIndex() {
        var view = findMainView();
        if (view &amp;&amp; view.shadowRoot) {
            // Find the current page indicator (pb-facs-link or similar)
            var pbLink = view.shadowRoot.querySelector('pb-facs-link');
            if (pbLink) {
                var facs = pbLink.getAttribute('facs');
                if (facs) {
                    facs = facs.replace(/^#/, '');
                    var idx = pageIds.indexOf(facs);
                    if (idx !== -1) {
                        console.log('Detected current page:', facs, 'index:', idx);
                        return idx;
                    }
                }
            }
            
            // Fallback: look for data-facs attribute
            var pbEl = view.shadowRoot.querySelector('[data-facs]');
            if (pbEl) {
                var facs = pbEl.getAttribute('data-facs').replace(/^#/, '');
                var idx = pageIds.indexOf(facs);
                if (idx !== -1) {
                    console.log('Detected current page via data-facs:', facs, 'index:', idx);
                    return idx;
                }
            }
        }
        return currentIndex;
    }
    
    function navigateTo(pageId) {
        if (isLoading) return;
        isLoading = true;
        
        console.log('Navigating to page:', pageId);
        pbEvents.emit('pb-refresh', 'transcription', {
            id: pageId
        });
        
        setTimeout(function() {
            isLoading = false;
        }, 500);
    }
    
    function goToPrev() {
        if (pageIds.length === 0) {
            loadPageIds(goToPrev);
            return;
        }
        
        console.log('Prev: current index:', currentIndex, 'of', pageIds.length);
        
        if (currentIndex &gt; 0) {
            currentIndex--;
            console.log('Going to index:', currentIndex, '=', pageIds[currentIndex]);
            navigateTo(pageIds[currentIndex]);
        } else {
            console.log('Already at first page');
        }
    }
    
    function goToNext() {
        if (pageIds.length === 0) {
            loadPageIds(goToNext);
            return;
        }
        
        console.log('Next: current index:', currentIndex, 'of', pageIds.length);
        
        if (currentIndex &lt; pageIds.length - 1) {
            currentIndex++;
            console.log('Going to index:', currentIndex, '=', pageIds[currentIndex]);
            navigateTo(pageIds[currentIndex]);
        } else {
            console.log('Already at last page');
        }
    }
    
    // Sync currentIndex when TOC or other navigation happens
    pbEvents.subscribe('pb-update', 'transcription', function(ev) {
        if (pageIds.length === 0) return;
        
        setTimeout(function() {
            var newIndex = detectCurrentIndex();
            if (newIndex !== currentIndex) {
                console.log('External navigation detected, updating index from', currentIndex, 'to', newIndex);
                currentIndex = newIndex;
            }
        }, 300);
    });
    
    var prevBtn = document.getElementById('prevSection');
    var nextBtn = document.getElementById('nextSection');
    
    if (prevBtn) {
        prevBtn.addEventListener('click', function() {
            console.log('Prev clicked');
            goToPrev();
        });
    }
    
    if (nextBtn) {
        nextBtn.addEventListener('click', function() {
            console.log('Next clicked');
            goToNext();
        });
    }
    
    // Preload page IDs
    setTimeout(function() {
        loadPageIds();
    }, 2000);
    
    console.log('Page navigation ready');
});
//
</script>
